# Day 38: main への push で API イメージをビルドし、ECR に push して App Runner
# を更新するデプロイワークフロー。
#
# 前提(未整備・このワークフローを有効化する前に必要):
#   - apps/api/Dockerfile(API のコンテナ化)
#   - Terraform で enable_apprunner_service = true(App Runner サービス作成)
#   - GitHub Secrets: AWS_DEPLOY_ROLE_ARN(cicd.tf の github_deploy ロール)、
#     APPRUNNER_SERVICE_ARN(apprunner.tf の出力)
#
# ECR は IMMUTABLE タグ(Day 34)のため、イメージタグはコミット SHA を使う。

name: Deploy API to App Runner

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
  workflow_dispatch:

permissions:
  id-token: write # OIDC で AWS ロールを assume するために必要
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: shipyard/api

jobs:
  deploy:
    # AWS ブートストラップ前は失敗ではなく skip にする。AWS アカウント作成 +
    # terraform apply 完了 + Secrets 投入が済んだら、GitHub の Settings →
    # Variables で AWS_BOOTSTRAPPED=true に設定すると自動的に走り始める。
    if: ${{ vars.AWS_BOOTSTRAPPED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA"
          docker build -t "$IMAGE" -f apps/api/Dockerfile .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # 新しいイメージタグへ更新する。update-service は変更を検知して
      # 自動的にデプロイを開始する。source-configuration は JSON で渡す。
      - name: Deploy to App Runner
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
            --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE\",\"ImageRepositoryType\":\"ECR\",\"ImageConfiguration\":{\"Port\":\"3000\"}}}"
