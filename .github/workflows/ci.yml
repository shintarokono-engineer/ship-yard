name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同じブランチで連続して push された場合、古い実行をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # version は package.json の `packageManager` フィールドから自動取得
        # (action-setup v4 では明示指定すると packageManager と二重管理エラーになる)
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

  terraform:
    name: Terraform Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.5'

      - name: Terraform fmt
        run: terraform fmt -recursive -check
        working-directory: infra

      # -backend=false で S3 バックエンドへ接続せず構文・参照のみ検証する。
      - name: Terraform validate (prod)
        working-directory: infra/prod
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform validate (bootstrap)
        working-directory: infra/bootstrap
        run: |
          terraform init -backend=false
          terraform validate
